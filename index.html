<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Bortle 1 Naked Eye Simulation - Raihan Mohammad</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      #playButton {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        z-index: 999; padding: 15px 30px; background: rgba(0,0,0,0.8); color: white;
        border: 2px solid #fff; border-radius: 5px; cursor: pointer; font-family: sans-serif;
      }
    </style>
  </head>
  <body style="background-color: #000;">

    <div id="playButton">MULAI SIMULASI</div>

    <a-scene>
      <a-assets>
        <video id="bortleVideo" 
               src="https://docs.google.com/uc?export=download&id=1wIuGraujLc9E0Ej9-bbsREFWhMIRDBga" 
               crossorigin="anonymous" 
               loop="true" 
               playsinline 
               webkit-playsinline></video>
      </a-assets>

      <a-videosphere src="#bortleVideo" rotation="0 -90 0"></a-videosphere>
      
      <a-entity camera look-controls="magicWindowTrackingEnabled: true; touchEnabled: true"></a-entity>
    </a-scene>

    <script>
      var btn = document.querySelector('#playButton');
      var video = document.querySelector('#bortleVideo');
      
      btn.addEventListener('click', function() {
        video.play();
        btn.style.display = 'none';
        
        // Meminta izin sensor khusus pengguna iOS/Safari
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          DeviceOrientationEvent.requestPermission()
            .then(response => {
              if (response == 'granted') {
                console.log('Gyroscope permission granted');
              }
            })
            .catch(console.error);
        }
      });
    </script>
  </body>
</html>
